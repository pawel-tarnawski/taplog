<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1c1f2e"/>
      <stop offset="100%" stop-color="#0e1016"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- ── Top-left: Blue — active tracking ─────────────────── -->
  <rect x="40" y="40" width="206" height="206" rx="26" fill="#1a1e30"/>
  <rect x="40" y="40" width="206" height="206" rx="26" fill="#3b82f6" fill-opacity="0.12"/>
  <rect x="40" y="40" width="206" height="206" rx="26" fill="none" stroke="#3b82f6" stroke-width="4"/>
  <!-- Play button -->
  <polygon points="93,93 93,193 193,143" fill="#3b82f6"/>
  <!-- Tracking dot -->
  <circle cx="143" cy="228" r="9" fill="#3b82f6"/>

  <!-- ── Top-right: Purple — idle ──────────────────────────── -->
  <rect x="266" y="40" width="206" height="206" rx="26" fill="#181b26"/>
  <rect x="266" y="40" width="206" height="206" rx="26" fill="none" stroke="#a855f7" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Play button, muted -->
  <polygon points="327,101 327,185 411,143" fill="#a855f7" fill-opacity="0.45"/>

  <!-- ── Bottom-left: Cyan — idle ──────────────────────────── -->
  <rect x="40" y="266" width="206" height="206" rx="26" fill="#181b26"/>
  <rect x="40" y="266" width="206" height="206" rx="26" fill="none" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.45"/>
  <!-- Play button, muted -->
  <polygon points="101,327 101,411 185,369" fill="#06b6d4" fill-opacity="0.4"/>

  <!-- ── Bottom-right: Amber — pause tile ─────────────────── -->
  <rect x="266" y="266" width="206" height="206" rx="26" fill="#181b26"/>
  <rect x="266" y="266" width="206" height="206" rx="26" fill="#f59e0b" fill-opacity="0.1"/>
  <rect x="266" y="266" width="206" height="206" rx="26" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-opacity="0.65"/>
  <!-- Pause bars -->
  <rect x="333" y="328" width="28" height="82" rx="7" fill="#f59e0b" fill-opacity="0.7"/>
  <rect x="379" y="328" width="28" height="82" rx="7" fill="#f59e0b" fill-opacity="0.7"/>
</svg>
